        // 2. 渲染 Tab 按鈕區
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';

            itineraryData.forEach(day => {
                const isActive = day.id === currentActiveDay;
                const btn = document.createElement('button');
                
                // 狀態樣式切換：根據地區設定不同的 Active 顏色
                let activeColorClass = "bg-primary text-white shadow-md shadow-primary/30";
                const brisbaneDays = ['day1', 'day2', 'day3a', 'day3b', 'day4'];
                const gorDays = ['day6', 'day7'];
                
                if (brisbaneDays.includes(day.id)) {
                    activeColorClass = "bg-amber-500 text-white shadow-md shadow-amber-200/50"; // 布里斯本：琥珀金
                } else if (gorDays.includes(day.id)) {
                    activeColorClass = "bg-cyan-600 text-white shadow-md shadow-cyan-200/50"; // 大洋路：海洋青
                } else {
                    activeColorClass = "bg-indigo-600 text-white shadow-md shadow-indigo-200/50"; // 墨爾本：城市靛
                }

                const activeClass = `${activeColorClass} font-bold -translate-y-0.5`;
                const inactiveClass = "bg-gray-100 text-gray-500 hover:bg-gray-200 hover:text-gray-800 font-medium";

                btn.className = `px-5 py-2.5 rounded-full whitespace-nowrap transition-all duration-300 ${isActive ? activeClass : inactiveClass}`;
                btn.innerHTML = `<span class="block text-sm">${day.label}</span><span class="block text-xs opacity-80">${day.date}</span>`;
                
                btn.onclick = () => {
                    currentActiveDay = day.id;
                    renderTabs();       // 重繪 Tabs 以更新樣式
                    renderTimeline();   // 重繪時間軸內容
                    updateOverviewMap(day.id); // 切換時自動更新上方概覽地圖
                };

                container.appendChild(btn);
            });
        }

                        <h4 class="text-lg md:text-xl font-bold text-gray-800 mt-1 mb-1">${titleHtml}</h4>
                        <p class="text-gray-600 text-sm md:text-base leading-relaxed">${ev.desc}</p>
                        ${gmapLinkHtml}
                        ${notesHtml}
                    </div>
                `;
                listWrapper.appendChild(item);
            });

            container.appendChild(listWrapper);
        }

        // 4. 動態地圖更新邏輯 (免 API Key 內嵌 iframe)
        function updateOverviewMap(dayId) {
            const mapQueries = {
                "day1": "Brisbane, Australia",
                "day2": "Surfers Paradise, Queensland",
                "day3a": "Warner Bros. Movie World, Gold Coast",
                "day3b": "North Stradbroke Island, Queensland",
                "day4": "Brisbane CBD, Australia",
                "day5": "State Library Victoria, Melbourne",
                "day6": "Great Ocean Road, Victoria",
                "day7": "Twelve Apostles, Victoria",
                "day8": "Phillip Island Nature Parks, Victoria",
                "day9": "St Kilda Beach, Melbourne",
                "day10": "Melbourne CBD, Australia"
            };
            const query = mapQueries[dayId] || "Australia";
            const iframe = document.getElementById('dynamic-map');
            if(iframe) {
                // 利用 q= 搜尋點的特性嵌入地圖，z=12 控制縮放層級
                iframe.src = `https://maps.google.com/maps?q=${encodeURIComponent(query)}&t=&z=12&ie=UTF8&iwloc=&output=embed`;
            }
        }

        // 初始化
        window.onload = () => {
            renderAccommodations();
            renderTabs();
            renderTimeline();
            updateOverviewMap(currentActiveDay); // 初始化地圖位置
        };
    </script>
</body>
</html>
